spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jobradar}
    username: ${SPRING_DATASOURCE_USERNAME:jobradar}
    password: ${SPRING_DATASOURCE_PASSWORD:jobradar123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

logging:
  level:
    br.com.jobradar: INFO
